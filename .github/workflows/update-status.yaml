name: "Update Commit Status"
description: "Reusable action to update Git commit status checks (pending, success, failure, error)"

inputs:
  token:
    description: "GitHub token"
    required: true

  sha:
    description: "Commit SHA to update status for"
    required: true

  state:
    description: "State of the status (error, failure, pending, success)"
    required: true

  context:
    description: "Status context (e.g. ci/build, tests/unit)"
    required: true

  description:
    description: "Short description of the status"
    required: false
    default: ""

  target_url:
    description: "URL to associate with this status (logs, dashboard, etc.)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set commit status
      shell: bash
      run: |
        echo "Updating commit status..."

        curl -s -X POST \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/statuses/${{ inputs.sha }} \
          -d @- <<EOF
        {
          "state": "${{ inputs.state }}",
          "target_url": "${{ inputs.target_url }}",
          "description": "${{ inputs.description }}",
          "context": "${{ inputs.context }}"
        }
        EOF