name: non-prod-pipeline
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      environment:
        required: true
        type: string
env:
  ACC_ID: "634758830486"
jobs:
  non-prod-pipeline-pipeline:
    runs-on: self-hosted
    steps:
    - name: Commit ID
      run: |
        APP_VERSION=$(echo "${{ inputs.version }}" | cut -c1-7)
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
        echo "Using commit: $APP_VERSION"

    - name: Commit ID
      id: commit
      run: |
        APP_VERSION=$(echo "${{ inputs.version }}" | cut -c1-7)
        echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
        echo "Using commit: $APP_VERSION"


    - name: Check Commit Status
      run: |

        COMMIT_SHA=${{ inputs.version }}

        echo "Checking commit: $COMMIT_SHA"


        STATUS=$(curl -s \
        -H "Authorization: token ${{ github.token }}" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/${{ github.repository }}/commits/$COMMIT_SHA/status \
        | jq -r '.state')


        echo "Commit Status: $STATUS"


        if [ "$STATUS" != "success" ]; then
          echo "❌ Commit validation failed"
          exit 1
        fi


        echo "✅ Commit validation passed"


            
            