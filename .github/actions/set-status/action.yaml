name: "Set Commit Status"
description: "Reusable action to update commit status"

inputs:
  sha:
    required: true
  state:
    required: true
  context:
    required: true
  description:
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set status
      uses: actions/github-script@v7
      with:
        github-token: ${{ github.token }}
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: "${{ inputs.sha }}",
            state: "${{ inputs.state }}",
            context: "${{ inputs.context }}",
            description: "${{ inputs.description }}"
          });